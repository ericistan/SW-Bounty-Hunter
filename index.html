<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SW Bounty Hunter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <!-- Game Info Panel -->
      <div id="game-info" class="container">
        <h1>SW Bounty Hunter</h1>
        <div id="timer">Time Left: 20s</div>
          <div id="health">Health: 1</div>
         <div id="score">Score: 5</div>
        <div id="streak">Streak: 0 </div>
        <div id="max-streak">Max Streak: 0 </div>
        <button id="start-button">Start Game</button>
        <button id="reset-button">Reset Game</button>
        <div id="status-message"></div>
      </div>
      
      <!-- Game Board -->
      <div id="game-board" class="container">
        <div class="hole"><img class="character" src="/Assets/image/characters/stormtrooper-hot-toys-scale-star-wars-the-force-awakens-first-order-5.png" alt="" srcset=""></div>
        <div class="hole">2</div>
        <div class="hole">3</div>
        <div class="hole">4</div>
        <div class="hole">5</div>
        <div class="hole">6</div>
        <div class="hole">7</div>
        <div class="hole">8</div>
        <div class="hole">9</div>
      </div>
      
      <!-- Legend side panel with character icons and descriptions -->
      <div id="legend" class="container">
        <h2>Legend</h2>
        <div class="legend-item">
          <span class="legend-character stormtrooper"></span>
          <span>Stormtrooper: 10 points, -1 health</span>
        </div>
        <div class="legend-item">
          <span class="legend-character commander"></span>
          <span>Commander: 20 points, -1 health</span>
        </div>
        <div class="legend-item">
          <span class="legend-character death-trooper"></span>
          <span>Death Trooper: 30 points, -1 health</span>
        </div>
        <div class="legend-item">
          <span class="legend-character grogu"></span>
          <span>Grogu: 50 points, +1 health</span>
        </div>
        <div class="legend-item">
          <span class="legend-character armorer"></span>
          <span>The Armorer: 40 points, no health change</span>
        </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
